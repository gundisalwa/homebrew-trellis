name: update-formula

# Regenerate the formula from the latest Trellis release. Fired by the main repo on
# release (repository_dispatch: new-release) or manually (workflow_dispatch). Reads are
# public; the commit uses the tap's own GITHUB_TOKEN — no external secret here. (decision-0032)
on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate the formula, commit if it changed
        run: |
          bash scripts/gen-formula.sh
          if git diff --quiet -- Formula/trellis.rb; then
            echo "formula already current — nothing to commit"
            exit 0
          fi
          ver="$(grep -oE 'version "[^"]+"' Formula/trellis.rb | head -1 | cut -d'"' -f2)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/trellis.rb
          git commit -m "trellis ${ver}"
          git push
